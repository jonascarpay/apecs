resolver: lts-18.28

packages:
  - apecs
  - apecs-physics
  - apecs-gloss
  - apecs-stm
  - examples

extra-deps:
  - stm-containers-1.2.2
  -   stm-hamt-1.2.2.1
  -     primitive-extras-0.10.2.2
  -     hashable-1.4.7.0
